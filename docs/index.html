<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rīga – Atiešanas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #1e1e1e;
    --orange:   #ff8c00;
    --orange2:  #ff6600;
    --red:      #ff2200;
    --yellow:   #ffcc00;
    --green:    #22cc66;
    --muted:    #555;
    --text-xs:  0.72rem;
    --text-sm:  0.85rem;
    --text-base:0.95rem;
    --radius:   4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--orange);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 2rem;
  }

  .header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.6rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .station-name { font-size:1rem;letter-spacing:.2em;color:var(--orange2);text-transform:uppercase; }
  .clock { font-size:1.45rem;letter-spacing:.12em;color:var(--orange);font-variant-numeric:tabular-nums; }

  table { width:100%;max-width:900px;border-collapse:collapse; }
  thead tr { border-bottom:1px solid var(--border); }
  th {
    font-size:var(--text-xs);letter-spacing:.13em;color:var(--orange2);
    padding:.35rem .55rem;text-align:left;white-space:nowrap;text-transform:uppercase;
  }
  td {
    padding:.48rem .55rem;font-size:var(--text-base);
    border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;
  }
  tr.row-next { background:#1a0e00; }

  .delay { color:var(--red);font-size:var(--text-sm); }

  .badge { display:inline-block;padding:.1rem .4rem;border-radius:3px;font-size:var(--text-sm);font-weight:bold;line-height:1.4; }
  .bt { background:#1a1a1a;border:1px solid #ff660055;color:var(--orange); }
  .bp { background:#ff660018;border:1px solid var(--orange2);color:var(--orange2); }

  .next-label {
    display:inline-block;font-size:.58rem;letter-spacing:.1em;
    padding:.08em .4em;border-radius:2px;
    border:1px solid var(--orange2);color:var(--orange2);
    text-transform:uppercase;vertical-align:middle;margin-left:.4em;
    animation:blink 1.4s step-start infinite;
  }
  @keyframes blink { 50%{opacity:0;} }

  .stale-warn {
    width:100%;max-width:900px;
    background:#1a1400;border:1px solid var(--yellow);
    padding:.4rem .9rem;margin-bottom:.7rem;
    font-size:var(--text-xs);color:var(--yellow);
    display:none;border-radius:var(--radius);
  }

  .footer { max-width:900px;width:100%;display:flex;justify-content:space-between;flex-wrap:wrap;gap:.4rem;margin-top:.8rem; }
  .updated { font-size:var(--text-xs);color:var(--muted); }
  .legend  { font-size:var(--text-xs);color:var(--muted); }

  @media (max-width:600px) {
    td, th { padding:.4rem .35rem; }
    .clock { font-size:1.15rem; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="station-name">Rīga &bull; Atiešanas</span>
  <span class="clock" id="clock">--:--:--</span>
</div>

<div class="stale-warn" id="stale-warn">&#9888; Datu datums nesakrīt ar šodienu – tiek rādīts pēc laika.</div>

<table>
  <thead>
    <tr>
      <th>Nr.</th>
      <th>Galamerķis</th>
      <th>Laiks</th>
      <th>Kavēšanās</th>
      <th>Platf.</th>
      <th>Ceļš</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="footer">
  <div class="legend"><span style="color:var(--red)">+Xmin</span> = kavējas</div>
  <div class="updated" id="upd"></div>
</div>

<script>
const SHOW_MAX = 14;
const GRACE_MS = 2 * 60 * 1000; // 2 min grace after actual departure

function tickClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' +
    String(n.getMinutes()).padStart(2,'0') + ':' +
    String(n.getSeconds()).padStart(2,'0');
}
tickClock();
setInterval(tickClock, 1000);

// dep_utc is already UTC — getHours() returns local time correctly
function fmtTime(depUTC) {
  const d = new Date(depUTC);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

async function load() {
  try {
    const [sched, live] = await Promise.all([
      fetch('full-day-trains.json?t=' + Date.now()).then(r => r.json()),
      fetch('live-delays.json?t='     + Date.now()).then(r => r.json())
    ]);

    const nowMs  = Date.now();
    const delays = live.trains || {};

    // Stale-data check: sched.date is "YYYY-MM-DD" in local time
    const today = new Date();
    const localToday = today.getFullYear() + '-' +
      String(today.getMonth()+1).padStart(2,'0') + '-' +
      String(today.getDate()).padStart(2,'0');
    document.getElementById('stale-warn').style.display =
      (sched.date && sched.date !== localToday) ? 'block' : 'none';

    const upcoming = sched.trains
      .filter(tr => {
        // Pure UTC millisecond comparison — no timezone reconstruction needed
        const schedMs   = new Date(tr.dep_utc).getTime();
        const delayMs   = (delays[tr.nr]?.delay ?? 0) * 60_000;
        // Train stays until: scheduled UTC + delay + 2 min grace
        const expiresMs = schedMs + delayMs + GRACE_MS;
        return expiresMs > nowMs;
      })
      .slice(0, SHOW_MAX);

    const tb = document.getElementById('tbody');
    tb.innerHTML = '';

    upcoming.forEach((tr, idx) => {
      const delayMin  = delays[tr.nr]?.delay ?? 0;
      const delayHtml = delayMin > 0
        ? `<span class="delay">+${delayMin}&thinsp;min</span>`
        : '';

      const isNext   = idx === 0;
      const nextTag  = isNext ? `<span class="next-label">nākošais</span>` : '';
      const rowClass = isNext ? ' class="row-next"' : '';
      const platform = tr.platform != null ? `<span class="badge bp">${tr.platform}</span>` : '&mdash;';
      const track    = tr.track    != null ? `<span class="badge bt">${tr.track}</span>`    : '&mdash;';

      tb.innerHTML += `<tr${rowClass}>
        <td>${tr.nr}</td>
        <td>${tr.dest}${nextTag}</td>
        <td>${fmtTime(tr.dep_utc)}</td>
        <td>${delayHtml}</td>
        <td>${platform}</td>
        <td>${track}</td>
      </tr>`;
    });

    if (upcoming.length === 0) {
      tb.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted)">Šodien vairs nav gaidāmu vilcienu.</td></tr>`;
    }

    document.getElementById('upd').textContent = 'Atjaunots: ' + live.updated;

  } catch(e) {
    console.error('Load error:', e);
    document.getElementById('upd').textContent = 'Kļūda ielādējot datus.';
  }
}

load();
setInterval(load, 60_000);
</script>
</body>
</html>
