<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rīga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #1e1e1e;
    --orange:   #ff8c00;
    --orange2:  #ff6600;
    --red:      #ff2200;
    --yellow:   #ffcc00;
    --green:    #22cc66;
    --blue:     #4ab3ff;
    --muted:    #555;
    --text-xs:  0.72rem;
    --text-sm:  0.85rem;
    --text-base:0.95rem;
    --radius:   4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--orange);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 2rem;
  }

  .header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.6rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .station-name { font-size:1rem;letter-spacing:.2em;color:var(--orange2);text-transform:uppercase; }
  .clock { font-size:1.45rem;letter-spacing:.12em;color:var(--orange);font-variant-numeric:tabular-nums; }

  .section-header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin: 1.4rem 0 0.5rem;
  }
  .section-title { font-size:var(--text-xs);letter-spacing:.18em;text-transform:uppercase;white-space:nowrap; }
  .section-title.dep { color: var(--orange2); }
  .section-title.arr { color: var(--blue); }
  .section-line { flex:1;height:1px;background:var(--border); }

  .section-meta {
    width:100%;max-width:900px;
    font-size:var(--text-xs);color:var(--muted);
    margin-bottom:.4rem;letter-spacing:.04em;
  }

  table { width:100%;max-width:900px;border-collapse:collapse; }
  thead tr { border-bottom:1px solid var(--border); }
  th {
    font-size:var(--text-xs);letter-spacing:.13em;
    padding:.35rem .55rem;text-align:left;white-space:nowrap;text-transform:uppercase;
  }
  th.dep-th { color: var(--orange2); }
  th.arr-th { color: var(--blue); }
  td {
    padding:.48rem .55rem;font-size:var(--text-base);
    border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;
  }
  tr.row-next-dep { background:#1a0e00; }
  tr.row-next-arr { background:#00101a; }
  tr.row-tomorrow td { border-top:1px solid #2a2a2a; }

  @keyframes nr-blink {
    0%   { opacity: 1; }
    66%  { opacity: 1; }
    67%  { opacity: 0; }
    99%  { opacity: 0; }
    100% { opacity: 1; }
  }
  .blink-nr { animation: nr-blink 1.2s step-start infinite; color: var(--yellow); }

  .delay-tags { display:inline-flex;gap:.25rem;align-items:center; }
  .dtag {
    display:inline-block;padding:.08rem .35rem;border-radius:3px;
    font-size:var(--text-xs);line-height:1.5;white-space:nowrap;
  }
  .dtag-gps-empty  { border:1px solid #333;color:#444; }
  .dtag-gps-val    { border:1px solid #ff440055;color:var(--red);background:#1a0000; }
  .dtag-disp-empty { border:1px solid #333;color:#444; }
  .dtag-disp-val   { border:1px solid var(--yellow);color:var(--yellow);background:#1a1400; }

  .badge { display:inline-block;padding:.1rem .4rem;border-radius:3px;font-size:var(--text-sm);font-weight:bold;line-height:1.4; }
  .bt     { background:#1a1a1a;border:1px solid #ff660055;color:var(--orange); }
  .bp     { background:#ff660018;border:1px solid var(--orange2);color:var(--orange2); }
  .bt-arr { background:#001a1a;border:1px solid #4ab3ff55;color:var(--blue); }
  .bp-arr { background:#00131f;border:1px solid #4ab3ff88;color:var(--blue); }

  #debug-box {
    width:100%;max-width:900px;
    background:#1a0000;border:1px solid var(--red);
    padding:.6rem .9rem;margin-bottom:.7rem;
    font-size:var(--text-xs);color:var(--red);
    display:none;border-radius:var(--radius);
    white-space:pre-wrap;word-break:break-all;line-height:1.6;
  }

  .footer {
    max-width:900px;width:100%;
    display:flex;flex-direction:column;gap:.3rem;
    margin-top:1rem;border-top:1px solid var(--border);padding-top:.6rem;
  }
  .footer-row { display:flex;justify-content:space-between;flex-wrap:wrap;gap:.3rem; }
  .legend    { font-size:var(--text-xs);color:var(--muted); }
  .sync-line { font-size:var(--text-xs);color:var(--muted); }

  @media (max-width:600px) {
    td, th { padding:.4rem .35rem; }
    .clock { font-size:1.15rem; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="station-name">Rīga</span>
  <span class="clock" id="clock">--:--:--</span>
</div>

<div id="debug-box"></div>

<!-- DEPARTURES -->
<div class="section-header">
  <span class="section-title dep">Atiešanas</span>
  <div class="section-line"></div>
</div>
<div class="section-meta" id="meta-dep">Saraksts sinhr.: —</div>
<table>
  <thead>
    <tr>
      <th class="dep-th">Nr.</th>
      <th class="dep-th">Galamērķis</th>
      <th class="dep-th">Laiks</th>
      <th class="dep-th">Kavēšanās</th>
      <th class="dep-th">Platf.</th>
      <th class="dep-th">Ceļš</th>
    </tr>
  </thead>
  <tbody id="tbody-dep"></tbody>
</table>

<!-- ARRIVALS -->
<div class="section-header">
  <span class="section-title arr">Ierašanās</span>
  <div class="section-line"></div>
</div>
<div class="section-meta" id="meta-arr">Saraksts sinhr.: —</div>
<table>
  <thead>
    <tr>
      <th class="arr-th">Nr.</th>
      <th class="arr-th">Izcelsme</th>
      <th class="arr-th">Laiks</th>
      <th class="arr-th">Kavēšanās</th>
      <th class="arr-th">Platf.</th>
      <th class="arr-th">Ceļš</th>
    </tr>
  </thead>
  <tbody id="tbody-arr"></tbody>
</table>

<div class="footer">
  <div class="footer-row">
    <span class="legend">
      <span style="color:var(--red)">GPS</span> = gps kavēšanās &nbsp;
      <span style="color:var(--yellow)">DISP</span> = dispečera paziņojums
    </span>
  </div>
  <div class="footer-row">
    <span class="sync-line" id="sync-delays">Kavējumi sinhr.: —</span>
  </div>
</div>

<script>
const SHOW_MAX = 14;
const GRACE_MS = 2 * 60 * 1000;
const BLINK_MS = 5 * 60 * 1000;
const DAY_MS   = 86_400_000;

const dbg = document.getElementById('debug-box');
function showDebug(lines) { dbg.style.display = 'block'; dbg.textContent = lines.join('\n'); }

// ── Clock ────────────────────────────────────────────────────────────────
function tickClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' +
    String(n.getMinutes()).padStart(2,'0') + ':' +
    String(n.getSeconds()).padStart(2,'0');
}
tickClock();
setInterval(tickClock, 1000);

// ── Blink ticker ────────────────────────────────────────────────────────────
function tickBlink() {
  const nowMs = Date.now();
  document.querySelectorAll('td[data-dep-ms]').forEach(td => {
    const diff = parseInt(td.dataset.depMs, 10) - nowMs;
    td.classList.toggle('blink-nr', diff > 0 && diff <= BLINK_MS);
  });
}
setInterval(tickBlink, 1000);

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtTime(utcStr) {
  const d = new Date(utcStr);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function delayTagsHtml(info) {
  const gps  = info?.gps_delay        ?? 0;
  const disp = info?.dispatcher_delay ?? 0;
  const text = info?.dispatcher_text  ?? '';
  const gpsHtml = gps > 0
    ? `<span class="dtag dtag-gps-val" title="GPS kavēšanās">GPS +${gps}min</span>`
    : `<span class="dtag dtag-gps-empty" title="Nav GPS datu">GPS —</span>`;
  const dispTitle = text ? text.replace(/"/g, '&quot;') : 'Nav dispečera paziņojuma';
  const dispHtml = disp > 0
    ? `<span class="dtag dtag-disp-val" title="${dispTitle}">DISP +${disp}min</span>`
    : `<span class="dtag dtag-disp-empty" title="${dispTitle}">DISP —</span>`;
  return `<div class="delay-tags">${gpsHtml}${dispHtml}</div>`;
}

async function safeFetch(url) {
  const res  = await fetch(url);
  const text = await res.text();
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  try { return JSON.parse(text); }
  catch { throw new Error('JSON parse failed'); }
}

// ── Date normalisation ───────────────────────────────────────────────────────────
//
// The scraper stores schedules in UTC but Latvia is UTC+3 (EEST).
// A train that leaves at 05:04 local is stored as 2026-06-29T02:04:00Z even
// when the JSON was written on 2026-06-30. The calendar date in dep_utc is
// always "yesterday" when the file was scraped before midnight UTC (= before
// 03:00 EEST). We detect this and shift all times forward +24h so the
// browser's Date.now() comparison works correctly.
//
// Detection: look at the date portion of the FIRST train's time.
// If it is strictly before today's local date → shift the whole array.
function localDateStr(d) {
  // Returns "YYYY-MM-DD" in local time
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

function normaliseToToday(trains, timeKey) {
  if (!trains || trains.length === 0) return trains;

  const todayStr  = localDateStr(new Date());
  const firstDate = localDateStr(new Date(trains[0][timeKey]));

  if (firstDate >= todayStr) return trains; // already on today or future, no shift needed

  // All timestamps are from a past calendar day in local time → shift +24h
  const shiftMs = DAY_MS * Math.ceil(
    (new Date(todayStr).getTime() - new Date(firstDate).getTime()) / DAY_MS
  );

  return trains.map(tr => ({
    ...tr,
    [timeKey]: new Date(new Date(tr[timeKey]).getTime() + shiftMs).toISOString(),
  }));
}

// ── Cross-day blending (fill board with tomorrow when today runs out) ─────────
function shiftByDay(trains, timeKey) {
  return trains.map(tr => ({
    ...tr,
    [timeKey]: new Date(new Date(tr[timeKey]).getTime() + DAY_MS).toISOString(),
    _tomorrow: true,
  }));
}

function buildRows(trains, delays, timeKey) {
  const nowMs = Date.now();

  function isUpcoming(tr) {
    const schedMs  = new Date(tr[timeKey]).getTime();
    const info     = delays[tr.nr];
    const maxDelay = Math.max(info?.dispatcher_delay ?? 0, info?.gps_delay ?? 0);
    return (schedMs + maxDelay * 60_000 + GRACE_MS) > nowMs;
  }

  const upcoming = trains.filter(isUpcoming);
  if (upcoming.length >= SHOW_MAX) return upcoming.slice(0, SHOW_MAX);

  // Pad with tomorrow (same timetable shifted +24h)
  const need = SHOW_MAX - upcoming.length;
  return [...upcoming, ...shiftByDay(trains, timeKey).filter(isUpcoming).slice(0, need)];
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderTable(tbodyId, rows, delays, timeKey, nameKey, isArr) {
  const tb = document.getElementById(tbodyId);
  tb.innerHTML = '';
  let tomorrowLineDone = false;

  rows.forEach(tr => {
    const isTomorrow = !!tr._tomorrow;
    const info       = isTomorrow ? null : (delays[tr.nr] ?? null);
    const depMs      = new Date(tr[timeKey]).getTime();

    const rowClass = (isTomorrow && !tomorrowLineDone) ? ' class="row-tomorrow"' : '';
    if (isTomorrow) tomorrowLineDone = true;

    const platform = tr.platform != null
      ? `<span class="badge ${isArr ? 'bp-arr' : 'bp'}">${tr.platform}</span>`
      : '&mdash;';
    const track = tr.track != null
      ? `<span class="badge ${isArr ? 'bt-arr' : 'bt'}">${tr.track}</span>`
      : '&mdash;';

    tb.innerHTML += `<tr${rowClass}>
      <td data-dep-ms="${depMs}">${tr.nr}</td>
      <td>${tr[nameKey]}</td>
      <td>${fmtTime(tr[timeKey])}</td>
      <td>${delayTagsHtml(info)}</td>
      <td>${platform}</td>
      <td>${track}</td>
    </tr>`;
  });

  if (rows.length === 0) {
    tb.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted)">Nav datu.</td></tr>`;
  }
  tickBlink();
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const t = Date.now();
    const [r0, r1, r2, r3] = await Promise.allSettled([
      safeFetch(`full-day-trains.json?t=${t}`),
      safeFetch(`full-day-arrivals.json?t=${t}`),
      safeFetch(`live-delays.json?t=${t}`),
      safeFetch(`live-arrival-delays.json?t=${t}`),
    ]);

    if (r0.status === 'rejected') { showDebug(['DEP SCHED FAIL: ' + r0.reason]); return; }

    const depSched   = r0.value;
    const arrSched   = r1.status === 'fulfilled' ? r1.value : { trains: [], updated: null };
    const liveDep    = (r2.status === 'fulfilled' ? r2.value?.trains : null) ?? {};
    const liveArr    = (r3.status === 'fulfilled' ? r3.value?.trains : null) ?? {};
    const liveDepUpd = r2.status === 'fulfilled'  ? r2.value?.updated : null;

    document.getElementById('meta-dep').textContent    = 'Saraksts sinhr.: ' + (depSched.updated || '—');
    document.getElementById('meta-arr').textContent    = 'Saraksts sinhr.: ' + (arrSched.updated || '—');
    document.getElementById('sync-delays').textContent = 'Kavējumi sinhr.: '  + (liveDepUpd    || '—');

    // Normalise dates: shift +24h if scraper wrote yesterday's UTC date
    const depTrains = normaliseToToday(depSched.trains || [], 'dep_utc');
    const arrTrains = normaliseToToday(arrSched.trains || [], 'arr_utc');

    renderTable('tbody-dep', buildRows(depTrains, liveDep, 'dep_utc'), liveDep, 'dep_utc', 'dest',   false);
    renderTable('tbody-arr', buildRows(arrTrains, liveArr, 'arr_utc'), liveArr, 'arr_utc', 'origin', true);

    dbg.style.display = 'none';
  } catch(e) {
    showDebug(['UNEXPECTED: ' + e.message, e.stack || '']);
  }
}

load();
setInterval(load, 60_000);
</script>
</body>
</html>
