<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rīga – Atiešanas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #1e1e1e;
    --orange:   #ff8c00;
    --orange2:  #ff6600;
    --red:      #ff2200;
    --yellow:   #ffcc00;
    --green:    #22cc66;
    --muted:    #555;
    --text-xs:  0.72rem;
    --text-sm:  0.85rem;
    --text-base:0.95rem;
    --radius:   4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--orange);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 2rem;
  }

  .header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.6rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .station-name { font-size:1rem;letter-spacing:.2em;color:var(--orange2);text-transform:uppercase; }
  .clock { font-size:1.45rem;letter-spacing:.12em;color:var(--orange);font-variant-numeric:tabular-nums; }

  table { width:100%;max-width:900px;border-collapse:collapse; }
  thead tr { border-bottom:1px solid var(--border); }
  th {
    font-size:var(--text-xs);letter-spacing:.13em;color:var(--orange2);
    padding:.35rem .55rem;text-align:left;white-space:nowrap;text-transform:uppercase;
  }
  td {
    padding:.48rem .55rem;font-size:var(--text-base);
    border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;
  }
  tr.row-next { background:#1a0e00; }

  /* Past trains — dimmed filler rows */
  tr.row-past td { color: #444; }
  tr.row-past .badge { background:#111 !important;border-color:#333 !important;color:#444 !important; }

  .delay { color:var(--red);font-size:var(--text-sm); }

  .badge { display:inline-block;padding:.1rem .4rem;border-radius:3px;font-size:var(--text-sm);font-weight:bold;line-height:1.4; }
  .bt { background:#1a1a1a;border:1px solid #ff660055;color:var(--orange); }
  .bp { background:#ff660018;border:1px solid var(--orange2);color:var(--orange2); }

  .next-label {
    display:inline-block;font-size:.58rem;letter-spacing:.1em;
    padding:.08em .4em;border-radius:2px;
    border:1px solid var(--orange2);color:var(--orange2);
    text-transform:uppercase;vertical-align:middle;margin-left:.4em;
    animation:blink 1.4s step-start infinite;
  }
  .past-label {
    display:inline-block;font-size:.58rem;letter-spacing:.1em;
    padding:.08em .4em;border-radius:2px;
    border:1px solid #333;color:#444;
    text-transform:uppercase;vertical-align:middle;margin-left:.4em;
  }
  @keyframes blink { 50%{opacity:0;} }

  .stale-warn {
    width:100%;max-width:900px;
    background:#1a1400;border:1px solid var(--yellow);
    padding:.4rem .9rem;margin-bottom:.7rem;
    font-size:var(--text-xs);color:var(--yellow);
    display:none;border-radius:var(--radius);
  }

  #debug-box {
    width:100%;max-width:900px;
    background:#1a0000;border:1px solid var(--red);
    padding:.6rem .9rem;margin-bottom:.7rem;
    font-size:var(--text-xs);color:var(--red);
    display:none;border-radius:var(--radius);
    white-space:pre-wrap;word-break:break-all;
    line-height:1.6;
  }

  .footer { max-width:900px;width:100%;display:flex;justify-content:space-between;flex-wrap:wrap;gap:.4rem;margin-top:.8rem; }
  .updated { font-size:var(--text-xs);color:var(--muted); }
  .legend  { font-size:var(--text-xs);color:var(--muted); }

  @media (max-width:600px) {
    td, th { padding:.4rem .35rem; }
    .clock { font-size:1.15rem; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="station-name">Rīga &bull; Atiešanas</span>
  <span class="clock" id="clock">--:--:--</span>
</div>

<div class="stale-warn" id="stale-warn">&#9888; Datu datums nesakrīt ar šodienu – tiek rādīts pēc laika.</div>
<div id="debug-box"></div>

<table>
  <thead>
    <tr>
      <th>Nr.</th>
      <th>Galamerķis</th>
      <th>Laiks</th>
      <th>Kavēšanās</th>
      <th>Platf.</th>
      <th>Ceļš</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="footer">
  <div class="legend"><span style="color:var(--red)">+Xmin</span> = kavējas</div>
  <div class="updated" id="upd"></div>
</div>

<script>
const SHOW_MAX = 14;
const GRACE_MS = 2 * 60 * 1000;

const dbg = document.getElementById('debug-box');
function showDebug(lines) {
  dbg.style.display = 'block';
  dbg.textContent = lines.join('\n');
}

function tickClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' +
    String(n.getMinutes()).padStart(2,'0') + ':' +
    String(n.getSeconds()).padStart(2,'0');
}
tickClock();
setInterval(tickClock, 1000);

function fmtTime(depUTC) {
  const d = new Date(depUTC);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

async function safeFetch(url) {
  const res = await fetch(url);
  const text = await res.text();
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}\n${text.slice(0,300)}`);
  try {
    return JSON.parse(text);
  } catch(e) {
    throw new Error(`JSON parse failed for ${url}\nStatus: ${res.status}\nBody: ${text.slice(0,400)}`);
  }
}

async function load() {
  const debugLines = [];
  debugLines.push('load() @ ' + new Date().toISOString());
  debugLines.push('page URL: ' + location.href);

  try {
    const schedURL = 'full-day-trains.json?t=' + Date.now();
    const liveURL  = 'live-delays.json?t='     + Date.now();

    debugLines.push('fetching: ' + schedURL);
    let sched;
    try {
      sched = await safeFetch(schedURL);
      debugLines.push('sched OK — trains: ' + (sched.trains?.length ?? '?') + ', date: ' + sched.date);
    } catch(e) {
      debugLines.push('SCHED FAIL: ' + e.message);
      showDebug(debugLines);
      document.getElementById('upd').textContent = 'Kļūda: ' + e.message.split('\n')[0];
      return;
    }

    debugLines.push('fetching: ' + liveURL);
    let live = { trains: {}, updated: '' };
    try {
      live = await safeFetch(liveURL);
      debugLines.push('live OK — keys: ' + Object.keys(live.trains || {}).length);
    } catch(e) {
      debugLines.push('LIVE FAIL (non-fatal): ' + e.message);
    }

    const nowMs  = Date.now();
    const delays = live.trains || {};

    const today = new Date();
    const localToday = today.getFullYear() + '-' +
      String(today.getMonth()+1).padStart(2,'0') + '-' +
      String(today.getDate()).padStart(2,'0');

    debugLines.push('localToday: ' + localToday + ', sched.date: ' + sched.date);
    debugLines.push('nowMs UTC: ' + new Date(nowMs).toISOString());

    document.getElementById('stale-warn').style.display =
      (sched.date && sched.date !== localToday) ? 'block' : 'none';

    // Split all trains into upcoming and already-departed
    const upcoming = [];
    const departed = [];
    for (const tr of sched.trains) {
      const schedMs = new Date(tr.dep_utc).getTime();
      const delayMs = (delays[tr.nr]?.delay ?? 0) * 60_000;
      if ((schedMs + delayMs + GRACE_MS) > nowMs) {
        upcoming.push(tr);
      } else {
        departed.push(tr); // already sorted chronologically from JSON
      }
    }

    // Build display rows: upcoming first, then fill with most-recent departed
    let rows;
    if (upcoming.length >= SHOW_MAX) {
      rows = upcoming.slice(0, SHOW_MAX).map(tr => ({ tr, past: false }));
    } else {
      const need    = SHOW_MAX - upcoming.length;
      // departed is in chronological order — take the last `need` (most recent)
      const fillers = departed.slice(-need).reverse();
      rows = [
        ...upcoming.map(tr  => ({ tr, past: false })),
        ...fillers.map(tr   => ({ tr, past: true  })),
      ];
    }

    debugLines.push('upcoming: ' + upcoming.length + ', fillers: ' + Math.max(0, SHOW_MAX - upcoming.length));

    const tb = document.getElementById('tbody');
    tb.innerHTML = '';

    rows.forEach(({ tr, past }, idx) => {
      const delayMin  = delays[tr.nr]?.delay ?? 0;
      const delayHtml = (!past && delayMin > 0)
        ? `<span class="delay">+${delayMin}&thinsp;min</span>`
        : '';
      const isNext   = !past && idx === 0;
      const nextTag  = isNext ? `<span class="next-label">nākošais</span>` : '';
      const pastTag  = past   ? `<span class="past-label">pagājis</span>`  : '';
      const rowClass = past ? ' class="row-past"' : (isNext ? ' class="row-next"' : '');
      const platform = tr.platform != null ? `<span class="badge bp">${tr.platform}</span>` : '&mdash;';
      const track    = tr.track    != null ? `<span class="badge bt">${tr.track}</span>`    : '&mdash;';

      tb.innerHTML += `<tr${rowClass}>
        <td>${tr.nr}</td>
        <td>${tr.dest}${nextTag}${pastTag}</td>
        <td>${fmtTime(tr.dep_utc)}</td>
        <td>${delayHtml}</td>
        <td>${platform}</td>
        <td>${track}</td>
      </tr>`;
    });

    if (rows.length === 0) {
      tb.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted)">Šodien nav neviena vilciena.</td></tr>`;
    }

    document.getElementById('upd').textContent = 'Atjaunots: ' + (live.updated || sched.updated || '—');

    if (debugLines.some(l => l.includes('FAIL'))) {
      showDebug(debugLines);
    } else {
      dbg.style.display = 'none';
    }

  } catch(e) {
    debugLines.push('UNEXPECTED: ' + e.message);
    debugLines.push(e.stack || '');
    showDebug(debugLines);
    document.getElementById('upd').textContent = 'Kļūda ielādējot datus.';
  }
}

load();
setInterval(load, 60_000);
</script>
</body>
</html>
