<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rīga – Atiešanas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #1e1e1e;
    --orange:   #ff8c00;
    --orange2:  #ff6600;
    --red:      #ff2200;
    --yellow:   #ffcc00;
    --green:    #22cc66;
    --muted:    #555;
    --text-xs:  0.72rem;
    --text-sm:  0.85rem;
    --text-base:0.95rem;
    --radius:   4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--orange);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 2rem;
  }

  .header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.6rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .station-name {
    font-size: 1rem;
    letter-spacing: .2em;
    color: var(--orange2);
    text-transform: uppercase;
  }
  .clock {
    font-size: 1.45rem;
    letter-spacing: .12em;
    color: var(--orange);
    font-variant-numeric: tabular-nums;
  }

  .alert {
    width: 100%;
    max-width: 900px;
    background: #1a0a00;
    border: 1px solid var(--orange2);
    padding: .5rem .9rem;
    margin-bottom: .9rem;
    font-size: var(--text-sm);
    color: #ffaa44;
    display: none;
    border-radius: var(--radius);
  }

  table { width: 100%; max-width: 900px; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    font-size: var(--text-xs);
    letter-spacing: .13em;
    color: var(--orange2);
    padding: .35rem .55rem;
    text-align: left;
    white-space: nowrap;
    text-transform: uppercase;
  }
  td {
    padding: .48rem .55rem;
    font-size: var(--text-base);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    vertical-align: middle;
  }
  tr.row-next { background: #1a0e00; }

  .delay-dispatcher { display:inline-flex;align-items:center;gap:.3em;color:var(--red);font-size:var(--text-sm); }
  .delay-gps        { display:inline-flex;align-items:center;gap:.3em;color:var(--yellow);font-size:var(--text-sm); }
  .delay-stopped    { display:inline-flex;align-items:center;gap:.3em;color:var(--red);font-size:var(--text-xs);opacity:.85; }
  .delay-none       { color:var(--green);font-size:var(--text-xs); }

  .src-tag {
    display:inline-block;font-size:.6rem;letter-spacing:.05em;
    padding:.05em .3em;border-radius:2px;vertical-align:middle;
    text-transform:uppercase;line-height:1.5;
  }
  .src-disp { background:#3a0800;border:1px solid var(--red);color:var(--red); }
  .src-gps  { background:#2a2000;border:1px solid var(--yellow);color:var(--yellow); }

  .badge { display:inline-block;padding:.1rem .4rem;border-radius:3px;font-size:var(--text-sm);font-weight:bold;line-height:1.4; }
  .bt { background:#1a1a1a;border:1px solid #ff660055;color:var(--orange); }
  .bp { background:#ff660018;border:1px solid var(--orange2);color:var(--orange2); }

  .next-label {
    display:inline-block;font-size:.58rem;letter-spacing:.1em;
    padding:.08em .4em;border-radius:2px;
    border:1px solid var(--orange2);color:var(--orange2);
    text-transform:uppercase;vertical-align:middle;margin-left:.4em;
    animation:blink 1.4s step-start infinite;
  }
  @keyframes blink { 50% { opacity:0; } }

  .stale-warn {
    width:100%;max-width:900px;
    background:#1a1400;border:1px solid var(--yellow);
    padding:.4rem .9rem;margin-bottom:.7rem;
    font-size:var(--text-xs);color:var(--yellow);
    display:none;border-radius:var(--radius);
  }

  .footer {
    max-width:900px;width:100%;
    display:flex;justify-content:space-between;
    flex-wrap:wrap;gap:.4rem;margin-top:.8rem;
  }
  .updated { font-size:var(--text-xs);color:var(--muted); }
  .legend  { font-size:var(--text-xs);color:var(--muted);display:flex;gap:.8rem;flex-wrap:wrap; }
  .leg-item { display:flex;align-items:center;gap:.3em; }

  @media (max-width:600px) {
    .col-route { display:none; }
    td, th { padding:.4rem .35rem; }
    .clock { font-size:1.15rem; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="station-name">Rīga &bull; Atiešanas</span>
  <span class="clock" id="clock">--:--:--</span>
</div>

<div class="stale-warn" id="stale-warn">&#9888; Datu datums nesakrīt ar šodienu – tiek rādīts pēc laika.</div>
<div class="alert" id="alert"></div>

<table>
  <thead>
    <tr>
      <th>Nr.</th>
      <th>Galamerķis</th>
      <th>Laiks</th>
      <th>Kavēšanās</th>
      <th>Platf.</th>
      <th>Ceļš</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="footer">
  <div class="legend">
    <span class="leg-item"><span style="color:var(--red)">+Xmin</span>&thinsp;<span class="src-tag src-disp">disp</span>&nbsp;Dispeċers</span>
    <span class="leg-item"><span style="color:var(--yellow)">+Xmin</span>&thinsp;<span class="src-tag src-gps">gps</span>&nbsp;GPS</span>
    <span class="leg-item"><span style="color:var(--green)">&#10003;</span>&nbsp;Laicīgi</span>
  </div>
  <div class="updated" id="upd"></div>
</div>

<script>
const SHOW_MAX = 14;

// ── Clock using device local time ──
function tickClock() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  const s = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
}
tickClock();
setInterval(tickClock, 1000);

// ── Format dep_utc as HH:MM using the DEVICE local time ──
// new Date(utcString) gives a Date in UTC internally.
// getHours()/getMinutes() returns LOCAL time automatically.
// If the device is set to EEST (Europe/Riga), this is correct.
function fmtTime(depUTC) {
  const d = new Date(depUTC);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

// ── Build a comparable timestamp for filtering ──
// Takes the local HH:MM:SS of the departure and places it on today's date
// so the cutoff comparison works even when the JSON was scraped yesterday.
function depAsToday(depUTC) {
  const d   = new Date(depUTC);
  const now = new Date();
  // Use today's local Y/M/D with the departure's local H/M/S
  return new Date(
    now.getFullYear(), now.getMonth(), now.getDate(),
    d.getHours(), d.getMinutes(), d.getSeconds()
  );
}

// ── Main loader ──
async function load() {
  try {
    const [sched, live] = await Promise.all([
      fetch('full-day-trains.json?t=' + Date.now()).then(r => r.json()),
      fetch('live-delays.json?t='     + Date.now()).then(r => r.json())
    ]);

    const now    = new Date();
    const delays = live.delays || {};
    const alerts = live.alerts || {};

    // Stale-data check: compare JSON date field to device local date
    const localToday = now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0');
    const jsonDate = sched.date || '';
    document.getElementById('stale-warn').style.display =
      (jsonDate && jsonDate !== localToday) ? 'block' : 'none';

    const cutoff = new Date(now.getTime() - 2 * 60 * 1000);

    const upcoming = sched.trains
      .map(tr => ({ ...tr, _dep: depAsToday(tr.dep_utc) }))
      .filter(tr => {
        // Trains with a dispatcher alert are always shown regardless of time
        if (alerts[tr.nr] != null) return true;
        return tr._dep > cutoff;
      })
      .slice(0, SHOW_MAX);

    const tb = document.getElementById('tbody');
    tb.innerHTML = '';

    upcoming.forEach((tr, idx) => {
      let delayHtml = '';
      const dispMin = alerts[tr.nr];

      if (dispMin != null) {
        // Dispatcher alert always wins over GPS
        delayHtml = dispMin > 0
          ? `<span class="delay-dispatcher">+${dispMin}&thinsp;min <span class="src-tag src-disp">disp</span></span>`
          : `<span class="delay-dispatcher"><span class="src-tag src-disp">disp</span></span>`;
      } else {
        const gps = tr.route_id ? delays[tr.route_id] : null;
        if (gps) {
          if (gps.stopped) {
            delayHtml = `<span class="delay-stopped">&#9632; apst.</span>`;
          } else if (gps.gps_delay_min > 0) {
            delayHtml = `<span class="delay-gps">+${gps.gps_delay_min}&thinsp;min <span class="src-tag src-gps">gps</span></span>`;
          } else if (gps.gps_active) {
            delayHtml = `<span class="delay-none">&#10003;</span>`;
          }
          // gps_active:false + 0 delay = no badge (signal lost, unknown state)
        }
      }

      const isNext   = idx === 0;
      const nextTag  = isNext ? `<span class="next-label">nākošais</span>` : '';
      const rowClass = isNext ? ' class="row-next"' : '';
      const platform = tr.platform != null ? `<span class="badge bp">${tr.platform}</span>` : '&mdash;';
      const track    = tr.track    != null ? `<span class="badge bt">${tr.track}</span>`    : '&mdash;';

      tb.innerHTML += `<tr${rowClass}>
        <td>${tr.nr}</td>
        <td>${tr.dest}${nextTag}</td>
        <td>${fmtTime(tr.dep_utc)}</td>
        <td>${delayHtml}</td>
        <td>${platform}</td>
        <td>${track}</td>
      </tr>`;
    });

    if (upcoming.length === 0) {
      tb.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted)">Šodien vairs nav gaidāmu vilcienu.</td></tr>`;
    }

    // Alert banner
    const alertParts = Object.entries(alerts).map(([nr, min]) =>
      min > 0 ? `Vilciens ${nr} kavējas ${min} min` : `Vilciens ${nr} – dispečera paziņojums`
    );
    const al = document.getElementById('alert');
    if (alertParts.length) { al.textContent = alertParts.join('  |  '); al.style.display = 'block'; }
    else                   { al.style.display = 'none'; }

    document.getElementById('upd').textContent = 'Atjaunots: ' + live.updated;

  } catch(e) {
    console.error('Load error:', e);
    document.getElementById('upd').textContent = 'Kļūda ielādējot datus.';
  }
}

load();
setInterval(load, 60_000);
</script>
</body>
</html>
