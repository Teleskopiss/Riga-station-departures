name: Scrape Live Delays

on:
  workflow_dispatch:

concurrency:
  group: scrape-delays
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-delays:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run delay scraper
        run: python scraper/scrape_delays.py
        env:
          PYTHONPATH: ${{ github.workspace }}/scraper

      - name: Commit and push
        run: |
          git add docs/live-delays.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: update live delays [skip ci]" && git pull --rebase origin main && git push)
