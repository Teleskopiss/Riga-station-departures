name: Scrape Riga Departures

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      # Run scraper 3 times, 20s apart, inside one job.
      # GitHub throttles per-minute cron on low-activity repos,
      # so this guarantees at least 3 updates per triggered run.
      - name: Run scraper loop
        run: |
          for i in 1 2 3; do
            echo "--- run $i ---"
            python scraper/scrape.py
            git add docs/departures.json
            git diff --cached --quiet || git commit -m "chore: update departures [skip ci]"
            git push
            [ $i -lt 3 ] && sleep 20
          done
        env:
          PYTHONPATH: ${{ github.workspace }}/scraper

      - name: Configure git
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
